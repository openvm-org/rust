name: Build Toolchain

on:
  workflow_call:
    inputs:
      runner:
        required: true
        type: string
  workflow_dispatch:
    inputs:
      runner:
        required: true
        type: string
        default: "ubuntu-22.04"

jobs:
  build:
    name: Build
    runs-on: ${{ inputs.runner }}
    timeout-minutes: 180
    env:
      GITHUB_ACTIONS: "false"
      CARGO_TARGET_RISCV64IM_UNKNOWN_OPENVM_ELF_RUSTFLAGS: "-Cpasses=lower-atomic"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: "recursive"
          fetch-depth: 0

      - name: Detect host triple
        id: host
        run: |
          # Match rustc's host detection
          ARCH=$(uname -m)
          OS=$(uname -s)
          case "$ARCH" in
            x86_64)  ARCH_TRIPLE="x86_64" ;;
            arm64|aarch64) ARCH_TRIPLE="aarch64" ;;
            *) echo "Unsupported arch: $ARCH"; exit 1 ;;
          esac
          case "$OS" in
            Linux)  HOST="${ARCH_TRIPLE}-unknown-linux-gnu" ;;
            Darwin) HOST="${ARCH_TRIPLE}-apple-darwin" ;;
            *) echo "Unsupported OS: $OS"; exit 1 ;;
          esac
          echo "triple=$HOST" >> "$GITHUB_OUTPUT"
          echo "Detected host triple: $HOST"

      - name: Free disk space (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache
          df -h

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential python3 curl cmake ninja-build pkg-config libssl-dev

      - name: Write bootstrap.toml
        run: |
          cat > bootstrap.toml << 'EOF'
          [build]
          extended = true
          tools = ["cargo", "cargo-clippy", "clippy", "rustfmt"]
          cargo-native-static = true

          [rust]
          lld = true
          llvm-tools = true

          [llvm]
          download-ci-llvm = false
          EOF

      - name: Create target sanity check workaround
        run: |
          mkdir -p /tmp/rustc-targets
          cat > /tmp/rustc-targets/riscv64im-unknown-openvm-elf.json << 'EOF'
          {"arch": "riscv64", "os": "openvm", "llvm-target": "riscv64"}
          EOF

      - name: Build toolchain
        env:
          RUST_TARGET_PATH: /tmp/rustc-targets
        run: |
          python3 x.py build --stage 2 compiler/rustc library \
            --target ${{ steps.host.outputs.triple }},riscv64im-unknown-openvm-elf

      - name: Atomic smoke test on prebuilt std
        # Guard against `-Cpasses=lower-atomic` silently failing to apply to the
        # guest std build (e.g. via a typo'd env var or a future bootstrap
        # refactor). The single-threaded openvm guest cannot execute the
        # RV64A extension; any `lr.w/d`, `sc.w/d`, or `amo*.w/d` in shipped
        # rlibs is a release blocker.
        shell: bash
        run: |
          set -euo pipefail
          HOST="${{ steps.host.outputs.triple }}"
          GUEST=riscv64im-unknown-openvm-elf
          OBJDUMP="$PWD/build/$HOST/stage2/lib/rustlib/$HOST/bin/llvm-objdump"
          RLIB_DIR="$PWD/build/$HOST/stage2/lib/rustlib/$GUEST/lib"

          if [ ! -x "$OBJDUMP" ]; then
            echo "::error::llvm-objdump not found at $OBJDUMP (is llvm-tools=true in bootstrap.toml?)"
            exit 1
          fi
          if [ ! -d "$RLIB_DIR" ]; then
            echo "::error::Guest rlib dir not found: $RLIB_DIR"
            exit 1
          fi

          # RV64A mnemonics: load-reserved, store-conditional, and the amo* family.
          FORBIDDEN_RE='\b(lr\.[wd]|sc\.[wd]|amo[a-z]+\.[wd])\b'

          failures=()
          for rlib in "$RLIB_DIR"/*.rlib; do
            hits=$("$OBJDUMP" -d "$rlib" 2>/dev/null | grep -E "$FORBIDDEN_RE" || true)
            if [ -n "$hits" ]; then
              failures+=("$(basename "$rlib")")
              echo "::error file=$rlib::A-extension instructions present"
              echo "$hits" | head -10
            fi
          done

          if [ "${#failures[@]}" -ne 0 ]; then
            echo "::error::lower-atomic pass did not run on: ${failures[*]}"
            exit 1
          fi
          echo "OK: no A-extension instructions in prebuilt std rlibs for $GUEST."

      - name: Package toolchain
        run: |
          cd build/${{ steps.host.outputs.triple }}/stage2
          # Drop both `lib/rustlib/{src,rustc-src}`: we ship prebuilt std rlibs for the
          # guest target, so consumers don't need `-Z build-std` and don't need rust-src.
          tar --exclude lib/rustlib/src \
              --exclude lib/rustlib/rustc-src \
              -hczvf ../../../rust-toolchain-${{ steps.host.outputs.triple }}.tar.gz .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rust-toolchain-${{ steps.host.outputs.triple }}
          path: rust-toolchain-${{ steps.host.outputs.triple }}.tar.gz
          retention-days: 7
