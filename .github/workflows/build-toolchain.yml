name: Build Toolchain

on:
  workflow_call:
    inputs:
      runner:
        required: true
        type: string
      host-target:
        required: true
        type: string
  workflow_dispatch:
    inputs:
      runner:
        required: true
        type: string
        default: "ubuntu-22.04"
      host-target:
        required: true
        type: string
        default: "x86_64-unknown-linux-gnu"

jobs:
  build:
    name: Build (${{ inputs.host-target }})
    runs-on: ${{ inputs.runner }}
    timeout-minutes: 180
    env:
      GITHUB_ACTIONS: "false"
      CARGO_TARGET_RISCV64IM_UNKNOWN_OPENVM_ELF_RUSTFLAGS: "-Cpasses=lower-atomic"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: "recursive"
          fetch-depth: 0

      - name: Free disk space (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache
          df -h

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential python3 curl cmake ninja-build pkg-config libssl-dev

      - name: Write bootstrap.toml
        run: |
          cat > bootstrap.toml << 'EOF'
          [build]
          extended = true
          tools = ["cargo", "cargo-clippy", "clippy", "rustfmt"]
          cargo-native-static = true

          [rust]
          lld = true
          llvm-tools = true

          [llvm]
          download-ci-llvm = false
          EOF

      - name: Create target sanity check workaround
        run: |
          mkdir -p /tmp/rustc-targets
          cat > /tmp/rustc-targets/riscv64im-unknown-openvm-elf.json << 'EOF'
          {"arch": "riscv64", "os": "openvm", "llvm-target": "riscv64"}
          EOF

      - name: Build toolchain
        env:
          RUST_TARGET_PATH: /tmp/rustc-targets
        run: |
          python3 x.py build --stage 2 compiler/rustc library \
            --target ${{ inputs.host-target }},riscv64im-unknown-openvm-elf

      - name: Package toolchain
        run: |
          cd build/${{ inputs.host-target }}/stage2
          tar --exclude lib/rustlib/src \
              --exclude lib/rustlib/rustc-src \
              -hczvf ../../../rust-toolchain-${{ inputs.host-target }}.tar.gz .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rust-toolchain-${{ inputs.host-target }}
          path: rust-toolchain-${{ inputs.host-target }}.tar.gz
          retention-days: 7
